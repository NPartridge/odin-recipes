    <img src="../img/salmon_mash.jpg" alt="A bowl of mashed potato with tinned salmon mixed into it" width="400">
    <h2>Description</h2>
    <p>This is a very simple recipe that was suggested to me by my parents when I was younger and penniless. It is basically 
        mashed potatoes with a can of salmon mixed through.
    </p>
    <h2>Ingredients</h2>
    <ul>
        <li>Potatoes</li>
        <li>Milk</li>
        <li>Butter</li>
        <li>Can of salmon</li>
        <li>Salt</li>
        <li>Pepper</li>
    </ul>
